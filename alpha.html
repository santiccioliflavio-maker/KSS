<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LIVELLO ALPHA</title>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; padding: 40px; }
        .header { border-bottom: 2px solid #0f0; margin-bottom: 30px; }
        .dossier { background: #111; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        img { width: 100%; border: 1px solid #0f0; opacity: 0.8; }
        img:hover { opacity: 1; transform: scale(1.02); transition: 0.3s; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ARCHIVIO ALPHA - DOCUMENTI RISERVATI</h1>
    </div>
    <div class="dossier">
        <h3>Dossier: Zip SP Beluga</h3>
        <p>NOTE: Mezzo intercettato durante sessione di test. Stato: Top Secret.</p>
    </div>
    <div class="gallery">
        <img src="foto1.jpg" alt="File 001">
        <img src="foto2.jpg" alt="File 002">
    </div>
</body>
</html>
